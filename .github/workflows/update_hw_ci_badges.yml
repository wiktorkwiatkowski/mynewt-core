name: Sync HW CI Badges

on:
  push:
    branches:
      - readme_badge_update_action
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Fetch and Update Badges
        run: python .github/scripts/update_badges.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          author: Mynewt Bot <dev@mynewt.apache.org>
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update HW CI badges in README
          branch: update-hw-ci-badges
          title: "Update HW CI status badges"
          body: |
            Update of the HW CI status badges in README.md
            - Fetched the latest test results from the Codecoup hardware lab
            - Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
